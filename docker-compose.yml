services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: scholarmap
      POSTGRES_USER: scholarmap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scholarmap}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarmap"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        USE_GPU: ${USE_GPU:-false}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://scholarmap:${POSTGRES_PASSWORD:-scholarmap}@db:5432/scholarmap
      MISTRAL_KEY: ${MISTRAL_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./books_work:/app/books_work
      - model_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # GPU passthrough — only active when NVIDIA Container Toolkit is installed and
    # USE_GPU=true is set in .env. Safe to leave in place on CPU-only machines;
    # Docker ignores it when no GPU runtime is available.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    develop:
      watch:
        - action: sync+restart
          path: ./api
          target: /app/api

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./web/src
          target: /app/src

volumes:
  postgres_data:
  model_cache:
